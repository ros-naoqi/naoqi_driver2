name: ros2-rolling-resolute

on:
  push

jobs:
  ros2_rolling_resolute_ci:
    name: rolling (resolute)
    uses: ./.github/workflows/ros2.yml
    with:
      ROS_DISTRO: rolling
      ROS_REPO: testing
      OS_NAME: ubuntu
      # Rolling migrated to Ubuntu 26.04 (Resolute Raccoon) after the
      # 2026-04 Noble sync; Ubuntu 24.04 no longer gets Rolling updates.
      OS_CODE_NAME: resolute
      ALLOW_FAIL: false
      UPSTREAM_WORKSPACE: ci/upstream.repos
