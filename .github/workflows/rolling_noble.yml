name: ros2-rolling-noble

on:
  push

jobs:
  ros2_rolling_noble_ci:
    name: rolling (noble)
    uses: ./.github/workflows/ros2.yml
    with:
      ROS_DISTRO: rolling
      ROS_REPO: testing
      OS_NAME: ubuntu
      OS_CODE_NAME: noble
      ALLOW_FAIL: false
      UPSTREAM_WORKSPACE: ci/upstream.repos
